name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  quality:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      # No `npm install`: the runtime + tooling are zero-dependency and the test
      # runner is Node's built-in (`node --test`).
      - name: Syntax check
        run: npm run lint
      - name: Unit & integration tests
        run: npm test

  validate:
    name: Validate & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Validate catalog
        run: npm run validate
      - name: Build catalog
        run: npm run build
      - name: Check generated files are committed and up to date
        run: |
          if [ -n "$(git status --porcelain catalog.json assets/catalog.js api/)" ]; then
            echo "::error::Generated files (catalog.json / assets/catalog.js / api/) are stale. Run 'npm run build' and commit the result."
            git --no-pager diff --stat catalog.json assets/catalog.js api/
            git status --porcelain api/ | head
            exit 1
          fi
          echo "Generated files are up to date."
