# Deploy the museum to GitHub Pages.
# Source: Settings → Pages → "GitHub Actions".
# This is GitHub's official two-job Pages template (proven/reliable), with two
# deliberate tweaks: full history (for the build-number stamp) and
# cancel-in-progress: false (so deploys never cancel each other → no re-run loop).
name: Deploy museum to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time, and NEVER cancel an in-flight deploy: a cancelled run
# looks like a failure and invites needless re-runs. Queued runs wait their turn.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the deploy stamp's commit-count build number is real.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build catalog + deploy stamp
        run: npm run build
        env:
          # Pin ?v=<build> onto asset URLs in the deployed index.html so a
          # post-deploy auto-reload fetches fresh JS/CSS (no manual hard refresh).
          SC_DEPLOY: "1"
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
