<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSS Marquee (modern &lt;marquee&gt;)</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "marquee-scroll",
    "title": "CSS Marquee",
    "summary": "A modern, accessible replacement for the deprecated <marquee> tag using CSS animation.",
    "description": "Recreates the scrolling-ticker look of the old <marquee> element with a translateX keyframe, pausing on hover and under reduced-motion — without the deprecated tag.",
    "theme": "retro-web",
    "categories": ["retro", "ticker", "animation"],
    "tags": ["marquee", "scroll", "ticker", "90s", "news", "deprecated-tag"],
    "tech": ["css"],
    "era": "1990s",
    "difficulty": "beginner",
    "dependencies": [],
    "browser_support": "All browsers (the CSS version). The original <marquee> tag is deprecated — do not use it.",
    "performance_notes": "Single translateX loop; cheap. Duplicate the content for a seamless infinite ticker.",
    "accessibility_notes": "Auto-scrolling text is a WCAG concern: provide a pause control (this pauses on hover/focus) and STOP entirely under prefers-reduced-motion. Keep the full text in the DOM for screen readers.",
    "customization": [
      { "name": "--speed", "description": "Scroll duration", "default": "12s" }
    ],
    "variations": ["Right-to-left vs left-to-right", "Vertical news ticker", "Seamless loop by duplicating content"],
    "related": ["rainbow-text", "blink-text"],
    "ai_usage": "Use for news tickers, stock tapes, and retro homages — never the deprecated <marquee> tag. Wrap content in an overflow:hidden track; the inner element animates translateX(0 → -100%). Duplicate the content inline for a seamless loop. PROVIDE A PAUSE (hover/focus + a real button in production) and disable under prefers-reduced-motion for accessibility."
  }
  </script>
  <style>
    :root { --speed: 12s; }
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; background: #000080; font-family: "Comic Sans MS", "Trebuchet MS", sans-serif; }
    .marquee { width: 320px; overflow: hidden; white-space: nowrap; border: 3px ridge #c0c0c0; background: #000; padding: .6rem 0; }
    .marquee__track { display: inline-block; padding-left: 100%; color: #00ff00; font-weight: 700; animation: scroll var(--speed) linear infinite; }
    .marquee:hover .marquee__track, .marquee:focus-within .marquee__track { animation-play-state: paused; }
    @keyframes scroll { to { transform: translateX(-100%); } }
    @media (prefers-reduced-motion: reduce) { .marquee__track { animation: none; padding-left: 1rem; } }
  </style>
</head>
<body>
  <div class="marquee" tabindex="0">
    <span class="marquee__track">★ Welcome to my homepage ★ Best viewed in 800x600 ★ Sign my guestbook! ★&nbsp;&nbsp;&nbsp;</span>
  </div>
</body>
</html>
