<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glass Navbar (composed)</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "glass-navbar",
    "title": "Glass Navbar (composed)",
    "summary": "A sticky frosted-glass navigation bar with animated underline links and a gradient CTA.",
    "description": "Composes glassmorphism + underline-grow links + a gradient button into a production-ready sticky header that blurs the content scrolling beneath it.",
    "theme": "combos-recipes",
    "categories": ["recipe", "navigation", "header"],
    "tags": ["navbar", "glass", "sticky", "underline", "header", "composition"],
    "tech": ["css"],
    "era": "2020s",
    "difficulty": "intermediate",
    "dependencies": [],
    "browser_support": "All modern browsers; backdrop-filter needs -webkit- in Safari.",
    "performance_notes": "backdrop-filter on a thin bar is fine. Underline animates transform only.",
    "accessibility_notes": "Semantic <nav>; links show the underline on :focus-visible too. Ensure link contrast over the blurred backdrop; provide a solid fallback where backdrop-filter is unsupported.",
    "customization": [
      { "name": "--glass", "description": "Bar tint/opacity", "default": "rgba(17,20,28,.6)" },
      { "name": "--accent", "description": "Underline + CTA color", "default": "#7c5cff" }
    ],
    "variations": ["Add the hamburger-morph toggle for mobile", "Shrink-on-scroll height", "Light-mode glass tint"],
    "related": ["glassmorphism-card", "underline-grow-link", "gradient-border-button", "hamburger-morph"],
    "ai_usage": "Drop-in sticky site header. The bar is position:sticky top:0 with a translucent background + backdrop-filter blur + 1px bottom border. Links use a scaleX underline pseudo-element (hover + focus-visible). Include a -webkit-backdrop-filter and a solid-background fallback. For mobile, pair with the hamburger-morph effect to toggle a menu. The demo scrolls content beneath so the blur is visible in the catalog frame."
  }
  </script>
  <style>
    :root { --glass: rgba(17,20,28,.6); --accent: #7c5cff; }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body { font-family: system-ui, sans-serif; }
    .page { height: 100vh; overflow-y: auto; background: linear-gradient(160deg, #1a1040, #2dd4bf22 60%, #0b0d12); }
    .navbar {
      position: sticky; top: 0; display: flex; align-items: center; justify-content: space-between;
      padding: .9rem 1.4rem; background: var(--glass);
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.12); z-index: 10;
    }
    .brand { color: #fff; font-weight: 800; font-size: 1.15rem; }
    .nav-links { display: flex; gap: 1.4rem; align-items: center; }
    .nav-links a { position: relative; color: #e7ebf3; text-decoration: none; font-size: .95rem; padding: .2rem 0; }
    .nav-links a::after { content: ""; position: absolute; left: 0; right: 0; bottom: -2px; height: 2px; background: var(--accent);
      transform: scaleX(0); transform-origin: center; transition: transform .25s; }
    .nav-links a:hover::after, .nav-links a:focus-visible::after { transform: scaleX(1); }
    .nav-cta { color: #fff; background: var(--accent); border: none; border-radius: 10px; padding: .55rem 1.1rem; font-weight: 700; cursor: pointer; }
    .filler { padding: 2rem 1.4rem; color: #e7ebf3; }
    .filler div { height: 90px; margin: 1rem 0; border-radius: 12px; background: rgba(255,255,255,.08); }
    @media (prefers-reduced-motion: reduce) { .nav-links a::after { transition: none; } }
  </style>
</head>
<body>
  <div class="page" id="page">
    <nav class="navbar">
      <span class="brand">◆ Lumen</span>
      <div class="nav-links">
        <a href="#">Product</a><a href="#">Pricing</a><a href="#">Docs</a>
        <button class="nav-cta">Sign up</button>
      </div>
    </nav>
    <div class="filler">
      <h2>Scroll — the bar frosts the content beneath it.</h2>
      <div></div><div></div><div></div><div></div><div></div>
    </div>
  </div>
  <script>
    if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
      var p = document.getElementById("page"), dir = 1;
      setInterval(function () {
        p.scrollTop += dir * 2;
        if (p.scrollTop + p.clientHeight >= p.scrollHeight - 2) dir = -1;
        if (p.scrollTop <= 0) dir = 1;
      }, 16);
    }
  </script>
</body>
</html>
