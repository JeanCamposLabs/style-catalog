<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animated Gradient Background</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "animated-gradient",
    "title": "Animated Gradient Background",
    "summary": "A smooth multi-color gradient that slowly drifts across the viewport.",
    "description": "An oversized linear-gradient with background-size 400% and an animated background-position produces an endlessly shifting color wash — the ubiquitous SaaS hero background.",
    "theme": "backgrounds",
    "categories": ["background", "gradient"],
    "tags": ["gradient", "animated", "hero", "saas", "wash", "ambient"],
    "tech": ["css"],
    "era": "2020s",
    "difficulty": "beginner",
    "dependencies": [],
    "browser_support": "All modern browsers.",
    "performance_notes": "Animating background-position is cheap; no JS. Long duration keeps repaints infrequent.",
    "accessibility_notes": "Decorative. Keep foreground text contrast high across all gradient stops. Animation stops under prefers-reduced-motion.",
    "customization": [
      { "name": "background", "description": "The gradient stops/angle", "default": "linear-gradient(-45deg,#ee7752,#e73c7e,#23a6d5,#23d5ab)" },
      { "name": "animation duration", "description": "Drift speed", "default": "15s" }
    ],
    "variations": ["Brand-color two-stop subtle drift", "Radial instead of linear", "Pair with a noise overlay for texture"],
    "related": ["aurora-background", "mesh-gradient"],
    "ai_usage": "Drop on a hero section or full page. Apply .animated-gradient to a full-size container; set background-size:400% 400% and animate background-position between corners. Use 3-4 harmonious colors. For readable text, overlay a semi-transparent dark layer or constrain text to a contrasted card. Keep duration long (12-20s) for an ambient feel."
  }
  </script>
  <style>
    html, body { height: 100%; margin: 0; }
    .animated-gradient {
      height: 100vh;
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @media (prefers-reduced-motion: reduce) { .animated-gradient { animation: none; } }
  </style>
</head>
<body>
  <div class="animated-gradient"></div>
</body>
</html>
