<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Floating Particles</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "floating-particles",
    "title": "Floating Particles",
    "summary": "Drifting glowing dots rise gently across the background, generated with a little JS.",
    "description": "A small script spawns N absolutely-positioned dots with randomized size, position, and animation duration; CSS floats them upward in a loop for an ambient particle field.",
    "theme": "backgrounds",
    "categories": ["background", "particles", "ambient"],
    "tags": ["particles", "float", "ambient", "dots", "bokeh", "atmosphere"],
    "tech": ["css", "js"],
    "era": "2020s",
    "difficulty": "intermediate",
    "dependencies": [],
    "browser_support": "All modern browsers.",
    "performance_notes": "Keep particle count modest (≈30-60). Each animates transform/opacity only. For hundreds of particles, switch to canvas.",
    "accessibility_notes": "Purely decorative; the script skips animation when prefers-reduced-motion is set (renders static dots).",
    "customization": [
      { "name": "COUNT", "description": "Number of particles", "default": "40" },
      { "name": "--particle", "description": "Particle color", "default": "#7c5cff" }
    ],
    "variations": ["Snow (fall downward, white)", "Embers (orange, rise + flicker)", "Connect nearby particles with lines via canvas"],
    "related": ["aurora-background", "starfield"],
    "ai_usage": "Ambient atmosphere behind heroes. The JS loop creates COUNT dots with random left%, size, delay, and duration, appended to a relative container. CSS animates translateY upward + fade. Keep count low for DOM-based; escalate to canvas for dense fields. Always behind content (z-index) and behind the reduced-motion guard."
  }
  </script>
  <style>
    :root { --particle: #7c5cff; }
    html, body { height: 100%; margin: 0; }
    .particles { position: relative; height: 100vh; overflow: hidden; background: radial-gradient(circle at 50% 120%, #1a1040, #05030a); }
    .particle {
      position: absolute; bottom: -20px; border-radius: 50%;
      background: var(--particle); box-shadow: 0 0 8px var(--particle);
      animation: rise linear infinite;
    }
    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: .9; }
      90% { opacity: .7; }
      100% { transform: translateY(-110vh) scale(.4); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) { .particle { animation: none; opacity: .5; } }
  </style>
</head>
<body>
  <div class="particles" id="field"></div>
  <script>
    var COUNT = 40;
    var field = document.getElementById("field");
    var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    for (var i = 0; i < COUNT; i++) {
      var p = document.createElement("span");
      p.className = "particle";
      var size = 2 + Math.random() * 6;
      p.style.width = p.style.height = size + "px";
      p.style.left = Math.random() * 100 + "%";
      if (!reduce) {
        p.style.animationDuration = (6 + Math.random() * 10) + "s";
        p.style.animationDelay = (-Math.random() * 16) + "s";
      } else {
        p.style.bottom = Math.random() * 100 + "%";
      }
      field.appendChild(p);
    }
  </script>
</body>
</html>
