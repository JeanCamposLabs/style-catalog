<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Following Dot &amp; Ring Cursor</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "follow-dot-cursor",
    "title": "Following Dot & Ring Cursor",
    "summary": "A custom cursor: a precise dot plus a larger ring that lags behind with easing.",
    "description": "Hides the native cursor and renders two elements — a dot that snaps to the pointer and a ring that eases toward it via a rAF lerp — the signature 'agency' custom cursor.",
    "theme": "cursors-pointers",
    "categories": ["cursor", "pointer", "interaction"],
    "tags": ["cursor", "custom-cursor", "follow", "ring", "lerp", "agency"],
    "tech": ["css", "js"],
    "era": "2020s",
    "difficulty": "intermediate",
    "dependencies": [],
    "browser_support": "Pointer devices only; on touch there is no cursor (gracefully no-ops). All modern browsers.",
    "performance_notes": "One rAF loop updating transforms; cheap. Use transform (not top/left) for smoothness.",
    "accessibility_notes": "Never hide the cursor on critical UI without a clear, large custom replacement. Respect prefers-reduced-motion (drop the lag/ease). Ensure focus styles remain for keyboard users.",
    "customization": [
      { "name": "--dot / --ring", "description": "Colors", "default": "#fff / #7c5cff" },
      { "name": "ease", "description": "Ring lag factor (0-1)", "default": "0.18" }
    ],
    "variations": ["Grow the ring on hovering links", "Invert colors over images (mix-blend-mode: difference)", "Magnetic ring that snaps to buttons"],
    "related": ["spotlight-cursor", "magnetic-button"],
    "ai_usage": "Expressive marketing sites. Render a fixed dot and ring; on pointermove store target x/y; in a rAF loop snap the dot and lerp the ring (current += (target-current)*ease). Use transform: translate3d for compositing. Add cursor:none on the body but KEEP it usable: enlarge the ring on interactive elements and never hide cursor on forms. Skip the lag under reduced motion. No-op on touch."
  }
  </script>
  <style>
    :root { --dot: #fff; --ring: #7c5cff; }
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; background: #0b0d12; color: #8b93a7; font-family: system-ui, sans-serif; cursor: none; }
    .hint { pointer-events: none; }
    .cur-dot, .cur-ring { position: fixed; top: 0; left: 0; border-radius: 50%; pointer-events: none; transform: translate(-50%,-50%); z-index: 50; }
    .cur-dot { width: 8px; height: 8px; background: var(--dot); }
    .cur-ring { width: 38px; height: 38px; border: 2px solid var(--ring); }
  </style>
</head>
<body>
  <p class="hint">Move your cursor</p>
  <div class="cur-ring" id="ring"></div>
  <div class="cur-dot" id="dot"></div>
  <script>
    var dot = document.getElementById("dot"), ring = document.getElementById("ring");
    var mx = innerWidth / 2, my = innerHeight / 2, rx = mx, ry = my;
    var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    addEventListener("pointermove", function (e) { mx = e.clientX; my = e.clientY; });
    function frame() {
      dot.style.transform = "translate(" + mx + "px," + my + "px) translate(-50%,-50%)";
      var ease = reduce ? 1 : 0.18;
      rx += (mx - rx) * ease; ry += (my - ry) * ease;
      ring.style.transform = "translate(" + rx + "px," + ry + "px) translate(-50%,-50%)";
      requestAnimationFrame(frame);
    }
    frame();
  </script>
</body>
</html>
