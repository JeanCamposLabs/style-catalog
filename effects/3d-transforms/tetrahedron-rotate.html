<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rotating Tetrahedron</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "tetrahedron-rotate",
    "title": "Rotating Tetrahedron",
    "summary": "A regular tetrahedron (four equilateral triangles) spins in pure-CSS 3D.",
    "description": "Three clip-path triangles are hinged at a triangular base and folded up to a shared apex inside a preserve-3d scene, closed by a flat base face and spun on a loop.",
    "theme": "3d-transforms",
    "categories": ["3d", "polyhedron", "loop"],
    "tags": ["tetrahedron", "3d", "rotate", "preserve-3d", "clip-path", "showcase"],
    "tech": ["css"],
    "era": "2010s",
    "difficulty": "advanced",
    "dependencies": [],
    "browser_support": "All modern browsers.",
    "performance_notes": "Four layers + continuous rotation; cheap standalone.",
    "accessibility_notes": "Decorative; pauses to a static pose under prefers-reduced-motion.",
    "customization": [
      { "name": "--s", "description": "Edge length (scales the whole solid)", "default": "170px" },
      { "name": "--dur", "description": "Rotation period", "default": "13s" }
    ],
    "variations": ["Glass faces (lower alpha)", "Wireframe (transparent fill + borders)", "Tip-down"],
    "related": ["cube-rotate", "pyramid-rotate", "octahedron-rotate"],
    "ai_usage": "Regular tetrahedron in pure CSS. Three equilateral side faces (clip-path polygon(50% 0,100% 100%,0 100%)) hinge at their bottom edge: rotateY(k*120deg) translateZ(--r) rotateX(--beta) with --r = inradius of the base triangle ≈ 0.2887*--s and --beta ≈ 19.471deg (so --L*sin(--beta)=--r, --L≈0.866*--s). The base is the same triangle laid flat with rotateX(90deg) about its centroid (transform-origin 50% 66.67%). Scale with --s. Wrap in a perspective preserve-3d scene, animate rotateY, pause under reduced motion."
  }
  </script>
  <style>
    /* Regular tetrahedron, fixed geometry (no CSS trig needed):
         face height   L     = (√3/2)·s ≈ 0.8660·s
         base inradius r      = s/(2√3) ≈ 0.2887·s
         fold tilt     beta   = 90° − acos(1/3) ≈ 19.471°  (so L·sin(beta)=r) */
    :root {
      --s: 170px;
      --dur: 13s;
      --L: calc(var(--s) * 0.8660);
      --r: calc(var(--s) * 0.2887);
      --beta: 19.471deg;
    }
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; background: radial-gradient(circle at 50% 38%, #102a40, #06060c); perspective: 820px; }
    .scene { transform-style: preserve-3d; transform: rotateX(-14deg); }
    .solid { position: relative; width: var(--s); height: var(--L); transform-style: preserve-3d; animation: spin var(--dur) linear infinite; }

    .face {
      position: absolute; left: 50%; top: 50%;
      width: var(--s); height: var(--L);
      margin-left: calc(var(--s) / -2); margin-top: calc(var(--L) * -1);
      background: linear-gradient(150deg, rgba(45,212,191,.82), rgba(124,92,255,.82));
      border: 1px solid rgba(255,255,255,.45);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      transform-origin: 50% 100%;
      backface-visibility: visible;
    }
    .f1 { transform: rotateY(0deg)   translateZ(var(--r)) rotateX(var(--beta)); }
    .f2 { transform: rotateY(120deg) translateZ(var(--r)) rotateX(var(--beta)); filter: brightness(.9); }
    .f3 { transform: rotateY(240deg) translateZ(var(--r)) rotateX(var(--beta)); filter: brightness(.8); }
    /* Base: the same triangle laid flat about its centroid (1/3 up from base). */
    .base {
      position: absolute; left: 50%; top: 50%;
      width: var(--s); height: var(--L);
      margin-left: calc(var(--s) / -2); margin-top: calc(var(--L) * -0.6667);
      background: linear-gradient(150deg, rgba(45,212,191,.6), rgba(124,92,255,.6));
      border: 1px solid rgba(255,255,255,.4);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      transform-origin: 50% 66.667%;
      transform: rotateX(90deg);
      backface-visibility: visible;
    }

    @keyframes spin { to { transform: rotateY(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .solid { animation: none; transform: rotateY(40deg); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="solid">
      <div class="face f1"></div>
      <div class="face f2"></div>
      <div class="face f3"></div>
      <div class="base"></div>
    </div>
  </div>
</body>
</html>
