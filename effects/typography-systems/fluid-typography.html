  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body { background: #0b0d12; color: #e7ebf3; font-family: system-ui, sans-serif; display: grid; place-items: center; padding: 1.2rem; text-align: center; }
    h1 { font-size: clamp(2rem, 1rem + 5vw, 4.5rem); margin: 0 0 .5rem; line-height: 1.05;
      background: linear-gradient(120deg,#7c5cff,#2dd4bf); -webkit-background-clip: text; background-clip: text; color: transparent; }
    p { font-size: clamp(1rem, .9rem + .6vw, 1.3rem); color: #b7bdcc; max-width: 40ch; margin: 0 auto; }
    code { color: #2dd4bf; font-family: ui-monospace, monospace; font-size: .8rem; }
  </style>
</head>
<body>
  <div>
    <h1>Resize me, I flow</h1>
    <p>Fluid type with <code>clamp(2rem, 1rem + 5vw, 4.5rem)</code> — smooth scaling, no breakpoints, still zoomable.</p>
  </div>
</body>
