  <style>

    body{display:grid;place-items:center;background:#0b0d12;font-family:system-ui,sans-serif}
    .blob{width:160px;height:160px;animation:spin 8s linear infinite}
    .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(prefers-reduced-motion:reduce){.blob{animation:none}.blob animate{display:none}}
