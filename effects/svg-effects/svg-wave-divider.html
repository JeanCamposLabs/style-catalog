<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SVG Animated Wave Divider</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "svg-wave-divider",
    "title": "SVG Animated Wave Divider",
    "summary": "Layered SVG waves that drift at different speeds to separate two sections with gentle, looping motion.",
    "description": "Three stacked wave paths translate horizontally at different rates, creating parallax water-like motion between page sections. A modern replacement for a flat section border, popular on landing pages.",
    "theme": "svg-effects",
    "categories": ["svg", "divider", "animation"],
    "tags": ["svg", "wave", "divider", "section", "parallax", "loop"],
    "tech": ["svg", "css"],
    "era": "2020s",
    "difficulty": "beginner",
    "dependencies": [],
    "browser_support": "All modern browsers.",
    "performance_notes": "Three CSS translateX loops on wide wave paths. transform-only; cheap. Pauses under reduced-motion.",
    "accessibility_notes": "Purely decorative (aria-hidden). Ensure adequate contrast between the two sections it divides.",
    "customization": [
      { "name": "section colors", "description": "Top and bottom fills", "default": "two brand tones" },
      { "name": "speeds", "description": "Per-layer durations", "default": "8s / 12s / 18s" }
    ],
    "variations": ["Single wave for a calmer look", "Vertical wave for side panels", "Sharper zig-zag path"],
    "related": ["wavy-divider", "svg-path-morph", "animated-gradient"],
    "ai_usage": "Use between landing-page sections for organic separation. Stack 2–3 wide wave <path>s (≥200% width) and animate each translateX from 0 to -50% at different durations for parallax. Match each wave's fill to the adjacent section color. Mark the SVG aria-hidden and pause animation under prefers-reduced-motion."
  }
  </script>
  <style>
    html,body{height:100%;margin:0;font-family:system-ui,sans-serif}
    .top{background:linear-gradient(120deg,#7c5cff,#a78bff);height:38vh;display:grid;place-items:center;color:#fff}
    .bottom{background:#0b0d12;height:38vh;display:grid;place-items:center;color:#8b93a7}
    .divider{position:relative;line-height:0;background:#0b0d12}
    .divider svg{display:block;width:100%;height:120px}
    .divider svg path{animation:flow linear infinite}
    .w1{fill:#9a82ff;animation-duration:8s;opacity:.6}
    .w2{fill:#7c5cff;animation-duration:12s;opacity:.8}
    .w3{fill:#0b0d12;animation-duration:18s}
    @keyframes flow{to{transform:translateX(-50%)}}
    h1{font-size:2rem;font-weight:800;letter-spacing:-.02em;margin:0}
    @media(prefers-reduced-motion:reduce){.divider svg path{animation:none}}
  </style>
</head>
<body>
  <section class="top"><h1>Section one</h1></section>
  <div class="divider">
    <svg viewBox="0 0 1200 120" preserveAspectRatio="none" aria-hidden="true">
      <path class="w1" d="M0,60 C150,100 350,20 600,60 C850,100 1050,20 1200,60 C1350,100 1550,20 1800,60 L1800,120 L0,120 Z"/>
      <path class="w2" d="M0,70 C150,30 350,110 600,70 C850,30 1050,110 1200,70 C1350,30 1550,110 1800,70 L1800,120 L0,120 Z"/>
      <path class="w3" d="M0,85 C200,55 400,115 600,85 C800,55 1000,115 1200,85 C1400,55 1600,115 1800,85 L1800,120 L0,120 Z"/>
    </svg>
  </div>
  <section class="bottom"><h1 style="color:#e8ecf6">Section two</h1></section>
</body>
</html>
