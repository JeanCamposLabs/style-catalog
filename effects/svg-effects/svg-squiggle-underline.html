<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SVG Squiggle Underline</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "svg-squiggle-underline",
    "title": "SVG Squiggle Underline",
    "summary": "A hand-drawn wavy underline that draws itself on hover/focus — a playful, human alternative to a flat underline.",
    "description": "An inline SVG squiggle path sits under a link; on hover or focus its stroke draws in via stroke-dashoffset, giving a marker-pen, hand-made feel. Common on editorial, portfolio, and friendly brand sites.",
    "theme": "svg-effects",
    "categories": ["svg", "link", "hover"],
    "tags": ["svg", "underline", "squiggle", "hand-drawn", "link", "stroke", "2026-trend"],
    "tech": ["svg", "css"],
    "era": "2020s",
    "difficulty": "beginner",
    "dependencies": [],
    "browser_support": "All modern browsers.",
    "performance_notes": "One stroke-dashoffset transition per link. Trivial.",
    "accessibility_notes": "Underline also appears on :focus-visible (not hover only) so keyboard users get the cue; the link remains a real <a>. Decorative SVG is aria-hidden.",
    "customization": [
      { "name": "--ink", "description": "Squiggle color", "default": "#ff6ec7" },
      { "name": "stroke-width / wave", "description": "Thickness and waviness", "default": "3 / gentle" }
    ],
    "variations": ["Always-on squiggle, straighten on hover", "Double underline", "Brush-texture stroke via filter"],
    "related": ["svg-line-draw","swiss-editorial"],
    "ai_usage": "Use for links, nav items, and emphasized words on editorial/portfolio/brand sites. Place an absolutely-positioned inline SVG squiggle under the text; set its path stroke-dasharray to the path length and offset it fully (hidden), then animate offset to 0 on :hover AND :focus-visible. Mark the SVG aria-hidden and keep the <a> real."
  }
  </script>
  <style>
    html,body{height:100%;margin:0}
    body{display:grid;place-items:center;background:#0c0e14;font-family:Georgia,serif}
    p{font-size:clamp(1.4rem,4vw,2.2rem);color:#e8ecf6;max-width:18ch;text-align:center;line-height:1.5}
    .sq{position:relative;color:#fff;text-decoration:none;white-space:nowrap;font-weight:600}
    .sq svg{position:absolute;left:0;bottom:-.35em;width:100%;height:.5em;overflow:visible}
    .sq svg path{fill:none;stroke:#ff6ec7;stroke-width:3;stroke-linecap:round;
      stroke-dasharray:120;stroke-dashoffset:120;transition:stroke-dashoffset .5s cubic-bezier(.65,0,.35,1)}
    .sq:hover svg path,.sq:focus-visible svg path{stroke-dashoffset:0}
    .sq:focus-visible{outline:none}
    @media(prefers-reduced-motion:reduce){.sq svg path{transition:none;stroke-dashoffset:0}}
  </style>
</head>
<body>
  <p>We design things <a class="sq" href="#" tabindex="0">worth&nbsp;a&nbsp;second&nbsp;look<svg viewBox="0 0 200 12" preserveAspectRatio="none" aria-hidden="true"><path d="M2,8 Q25,1 50,7 T100,7 T150,7 T198,6"/></svg></a>.</p>
</body>
</html>
