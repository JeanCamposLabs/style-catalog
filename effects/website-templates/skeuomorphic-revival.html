<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Skeuomorphic Revival — Music Player</title>
<script type="application/json" id="effect-meta">

<style>
  :root{--led:#46e0a0;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:"Helvetica Neue",system-ui,sans-serif;color:#2a2e36;
    background:linear-gradient(160deg,#cdd3db,#aeb6c2);display:grid;place-items:center;padding:2.5rem 1.2rem}
  .stage{max-width:1000px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
  .pitch .badge{display:inline-block;background:#fff;border-radius:999px;padding:.35rem .9rem;font-size:.8rem;color:#5a6270;box-shadow:0 1px 2px rgba(0,0,0,.15),inset 0 1px 0 #fff}
  .pitch h1{font-size:clamp(2.2rem,5vw,3.6rem);font-weight:800;letter-spacing:-.02em;line-height:1.05;margin:1rem 0 .6rem;
    color:#2a2e36;text-shadow:0 1px 0 rgba(255,255,255,.6)}
  .pitch p{color:#525a68;font-size:1.12rem;max-width:40ch}
  .metal-btn{display:inline-block;border:none;cursor:pointer;font-weight:700;color:#33383f;padding:.85rem 1.6rem;border-radius:12px;margin-top:1rem;
    background:linear-gradient(#fdfefe,#c3cad4);box-shadow:0 2px 4px rgba(0,0,0,.25),inset 0 1px 0 #fff,inset 0 -2px 4px rgba(0,0,0,.12)}
  .metal-btn:active{box-shadow:inset 0 2px 5px rgba(0,0,0,.3)}
  .metal-btn:focus-visible{outline:3px solid #5b8cff;outline-offset:3px}
  /* device */
  .device{justify-self:center;width:320px;border-radius:34px;padding:24px;
    background:linear-gradient(145deg,#eef1f5,#aab2bf);
    box-shadow:0 30px 60px rgba(40,50,70,.45),inset 0 2px 3px rgba(255,255,255,.9),inset 0 -4px 8px rgba(0,0,0,.25)}
  .brushed{border-radius:22px;padding:20px;background:
    repeating-linear-gradient(90deg,rgba(255,255,255,.5) 0 1px,rgba(0,0,0,.04) 1px 2px),linear-gradient(160deg,#dfe4ea,#b8c0cc);
    box-shadow:inset 0 2px 4px rgba(255,255,255,.7),inset 0 -3px 6px rgba(0,0,0,.2)}
  .screen{border-radius:14px;padding:1rem 1.1rem;color:#063b2b;position:relative;overflow:hidden;
    background:linear-gradient(160deg,#9be7c4,#5cc79c);
    box-shadow:inset 0 3px 8px rgba(0,0,0,.35),inset 0 -1px 0 rgba(255,255,255,.4),0 1px 0 rgba(255,255,255,.6)}
  .screen::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.45),transparent 45%);pointer-events:none}
  .screen .now{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;opacity:.7}
  .screen .track{font-weight:800;font-size:1.15rem;margin:.1rem 0}
  .eq{display:flex;align-items:flex-end;gap:3px;height:26px;margin-top:.4rem}
  .eq i{width:4px;background:#063b2b;border-radius:2px;height:30%}
  .device.playing .eq i{animation:eq .8s ease-in-out infinite alternate}
  .device.playing .eq i:nth-child(2){animation-delay:.1s}.device.playing .eq i:nth-child(3){animation-delay:.2s}
  .device.playing .eq i:nth-child(4){animation-delay:.15s}.device.playing .eq i:nth-child(5){animation-delay:.25s}
  @keyframes eq{to{height:100%}}
  .controls{display:flex;align-items:center;justify-content:space-between;margin-top:1.2rem}
  .round{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;color:#33383f;font-size:1.1rem;display:grid;place-items:center;
    background:linear-gradient(#fdfefe,#c3cad4);box-shadow:0 3px 6px rgba(0,0,0,.3),inset 0 1px 0 #fff,inset 0 -2px 5px rgba(0,0,0,.15)}
  .round:active{box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}
  .round.play{width:68px;height:68px;font-size:1.4rem;color:#0a6b4c;background:linear-gradient(#eafff6,#aee2cd)}
  .round:focus-visible{outline:3px solid #5b8cff;outline-offset:3px}
  .knob{width:64px;height:64px;border-radius:50%;position:relative;
    background:radial-gradient(circle at 50% 40%,#fbfdff,#aab2bf 60%,#8b94a3);
    box-shadow:0 4px 8px rgba(0,0,0,.35),inset 0 2px 3px rgba(255,255,255,.9),inset 0 -3px 6px rgba(0,0,0,.25)}
  .knob::after{content:"";position:absolute;left:50%;top:8px;width:4px;height:16px;background:#5a6270;border-radius:2px;transform:translateX(-50%)}
  .led{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#bfffe4,var(--led));box-shadow:0 0 10px var(--led),inset 0 -2px 3px rgba(0,0,0,.3)}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;color:#5a6270;font-size:.7rem;letter-spacing:.1em}
  @media(max-width:820px){.stage{grid-template-columns:1fr;text-align:center}.pitch p{margin-inline:auto}}
  @media(prefers-reduced-motion:reduce){.device.playing .eq i{animation:none;height:70%}}
</style>
</head>
<body>
  <main class="stage">
    <div class="pitch">
      <span class="badge">◉ The Æther One · hi-fi player</span>
      <h1>Music you can feel under your thumb.</h1>
      <p>Real buttons. Real weight. A warm, tactile player for people who miss the click. Lossless audio, 40-hour battery, machined aluminum.</p>
      <button class="metal-btn">Pre-order — $299</button>
    </div>

    <div class="device" id="device">
      <div class="brushed">
        <div class="topbar"><span>ÆTHER</span><span class="led" aria-hidden="true"></span></div>
        <div class="screen">
          <div class="now">Now playing</div>
          <div class="track">Afterglow — Remy Fields</div>
          <div class="eq" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
        </div>
        <div class="controls">
          <button class="round" aria-label="Previous track">⏮</button>
          <button class="round play" id="play" aria-label="Play" aria-pressed="false">▶</button>
          <button class="round" aria-label="Next track">⏭</button>
          <div class="knob" role="img" aria-label="Volume knob"></div>
        </div>
      </div>
    </div>
  </main>
  <script>
    var device=document.getElementById('device'),play=document.getElementById('play');
    play.addEventListener('click',function(){
      var on=device.classList.toggle('playing');
      play.textContent=on?'⏸':'▶'; play.setAttribute('aria-pressed',on); play.setAttribute('aria-label',on?'Pause':'Play');
    });
  </script>
</body>
</html>
