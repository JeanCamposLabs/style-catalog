<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Testimonial Wall — Social Proof</title>

<style>
  :root{--bg:#0b0d12;--surface:#12151f;--line:#242a3b;--text:#e8ecf6;--muted:#8b93a7;--accent:#7c5cff;--star:#fbbf24;--r:16px;}
  *{box-sizing:border-box}html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;line-height:1.6}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 1.4rem}
  nav{display:flex;align-items:center;justify-content:space-between;height:64px}
  .brand{font-weight:800}.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:.55rem 1.1rem;font-weight:700;cursor:pointer}
  .head{text-align:center;padding:3.5rem 0 1rem}
  .stars-big{color:var(--star);font-size:1.3rem;letter-spacing:2px}
  .head h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;letter-spacing:-.02em;margin:.6rem 0 .3rem}
  .head p{color:var(--muted);font-size:1.1rem}
  .logos{display:flex;gap:2rem;justify-content:center;flex-wrap:wrap;opacity:.6;font-weight:800;color:var(--muted);padding:1.6rem 0 2rem}
  .feature{background:linear-gradient(160deg,rgba(124,92,255,.18),var(--surface));border:1px solid var(--line);border-radius:20px;padding:2rem;text-align:center;max-width:720px;margin:0 auto 2rem}
  .feature blockquote{margin:0;font-size:clamp(1.3rem,2.6vw,1.7rem);font-weight:600;line-height:1.4}
  .feature .who{display:flex;gap:.7rem;align-items:center;justify-content:center;margin-top:1.2rem;color:var(--muted)}
  .av{width:42px;height:42px;border-radius:50%}
  .wall{columns:3;column-gap:1.1rem;padding-bottom:3rem}
  .card{break-inside:avoid;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:1.3rem;margin-bottom:1.1rem}
  .card .rate{color:var(--star);font-size:.9rem;letter-spacing:1px}
  .card blockquote{margin:.5rem 0 1rem;font-size:.98rem}
  .card figcaption{display:flex;gap:.6rem;align-items:center;color:var(--muted);font-size:.85rem}
  .card figcaption b{color:var(--text);display:block}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  footer{border-top:1px solid var(--line);color:var(--muted);text-align:center;padding:2.2rem 0;font-size:.9rem}
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .6s,transform .6s ease}.reveal.in{opacity:1;transform:none}
  @media(max-width:860px){.wall{columns:2}}@media(max-width:560px){.wall{columns:1}}
  @media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}html{scroll-behavior:auto}}
</style>
</head>
<body>
  <div class="wrap">
    <nav><div class="brand">◆ Nimbus</div><a class="btn" href="#">Start free</a></nav>
    <header class="head">
      <div class="stars-big" aria-hidden="true">★★★★★</div>
      <h1>Loved by 12,000+ teams</h1>
      <p>4.9 / 5 average across 3,400 reviews <span class="sr">— rated 4.9 out of 5</span></p>
    </header>
    <div class="logos"><span>ACME</span><span>Globex</span><span>Vertex</span><span>Initech</span><span>Hooli</span><span>Stark</span></div>

    <figure class="feature reveal">
      <div class="stars-big" aria-hidden="true">★★★★★</div>
      <blockquote>“We replaced four tools with Nimbus and shipped our roadmap a quarter early. It's the rare product the whole team actually fights to use.”</blockquote>
      <figcaption class="who"><span class="av" style="background:linear-gradient(135deg,#7c5cff,#22d3ee)"></span><span><b style="color:var(--text)">Priya Nair</b> · VP Engineering, Vertex</span></figcaption>
    </figure>

    <div class="wall">
      <figure class="card reveal"><div class="rate" aria-label="5 out of 5">★★★★★</div><blockquote>Setup took ten minutes and paid for itself in a week.</blockquote><figcaption><span class="av" style="background:linear-gradient(135deg,#ff6ec7,#ffb454)"></span><span><b>Sam Lee</b>Founder, Drift</span></figcaption></figure>
      <figure class="card reveal"><div class="rate" aria-label="5 out of 5">★★★★★</div><blockquote>The analytics alone are worth it. We finally see what's happening in real time, and the team rallied around the dashboards instantly.</blockquote><figcaption><span class="av" style="background:linear-gradient(135deg,#34d399,#0ea5e9)"></span><span><b>Mara Cho</b>Head of Growth</span></figcaption></figure>
      <figure class="card reveal"><div class="rate" aria-label="5 out of 5">★★★★★</div><blockquote>Support replies in minutes, not days.</blockquote><figcaption><span class="av" style="background:linear-gradient(135deg,#a78bff,#7c5cff)"></span><span><b>Theo Ruiz</b>CTO, Relay</span></figcaption></figure>
      <figure class="card reveal"><div class="rate" aria-label="5 out of 5">★★★★★</div><blockquote>Honestly the smoothest migration we've ever done — zero downtime and our data just appeared.</blockquote><figcaption><span class="av" style="background:linear-gradient(135deg,#fb7185,#f97316)"></span><span><b>Nora Vance</b>Ops Lead</span></figcaption></figure>
      <figure class="card reveal"><div class="rate" aria-label="5 out of 5">★★★★★</div><blockquote>It feels like it was built by people who actually do the work.</blockquote><figcaption><span class="av" style="background:linear-gradient(135deg,#2dd4bf,#7c5cff)"></span><span><b>Kojo Mensah</b>PM, Stark</span></figcaption></figure>
      <figure class="card reveal"><div class="rate" aria-label="5 out of 5">★★★★★</div><blockquote>Our NPS jumped 18 points the quarter after we switched. The team loves it and so do our customers.</blockquote><figcaption><span class="av" style="background:linear-gradient(135deg,#fbbf24,#f472b6)"></span><span><b>Aria Lund</b>VP Product</span></figcaption></figure>
    </div>

    <footer>© <span id="yr"></span> Nimbus, Inc. · Join 12,000+ happy teams.</footer>
  </div>
  <script>
    document.getElementById('yr').textContent=new Date().getFullYear();
    var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.1});
    document.querySelectorAll('.reveal').forEach(function(el){io.observe(el)});
  </script>
</body>
</html>
