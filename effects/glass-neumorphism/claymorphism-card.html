    "theme": "glass-neumorphism",
    "categories": ["surface", "claymorphism", "card"],
    "tags": ["claymorphism", "clay", "puffy", "3d", "playful", "inset-shadow"],
    "tech": ["css"],

    "difficulty": "beginner",
    "dependencies": [],
    "browser_support": "All browsers.",

  <style>
    :root { --clay: #7c5cff; --radius: 44px; }
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; background: #eef0ff; font-family: system-ui, sans-serif; }
    .clay {
      width: 220px; height: 220px; border-radius: var(--radius); background: var(--clay);
      display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 1.2rem;
      box-shadow:
        0 18px 40px rgba(124,92,255,.45),
        inset 8px 8px 16px rgba(255,255,255,.45),
        inset -10px -12px 22px rgba(60,40,140,.55);
    }
  </style>
</head>
<body>
  <div class="clay">Clay</div>
</body>
