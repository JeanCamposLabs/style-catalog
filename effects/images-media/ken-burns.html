<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ken Burns Effect</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "ken-burns",
    "title": "Ken Burns Effect",
    "summary": "A slow zoom-and-pan over a still image that adds cinematic life to hero photos.",
    "description": "Animates a slow scale + translate on an image inside an overflow-hidden frame, the documentary 'Ken Burns' pan-and-zoom, ideal for hero backgrounds and slideshows.",
    "theme": "images-media",
    "categories": ["image", "animation", "cinematic"],
    "tags": ["ken-burns", "zoom", "pan", "cinematic", "hero", "slideshow"],
    "tech": ["css"],
    "era": "timeless",
    "difficulty": "beginner",
    "dependencies": [],
    "browser_support": "All browsers.",
    "performance_notes": "Animating transform (scale/translate) is GPU-friendly. Slightly over-size the image so panning never reveals edges.",
    "accessibility_notes": "Ambient motion; disable under prefers-reduced-motion (show a static frame). Keep overlaid text on a scrim for contrast.",
    "customization": [
      { "name": "--dur", "description": "Pan/zoom duration", "default": "20s" },
      { "name": "scale range", "description": "Start/end scale", "default": "1 → 1.18" }
    ],
    "variations": ["Crossfade between multiple images for a slideshow", "Pan in different directions per slide", "Pair with a duotone or gradient overlay"],
    "related": ["image-zoom-reveal", "duotone-image"],
    "ai_usage": "Use for hero backgrounds and photo slideshows to add subtle motion. Put the image in an overflow:hidden frame, scale it slightly above 1 so there's room to move, and animate transform between two scale+translate states over a long duration (15-25s) with ease-in-out alternate. Add a dark scrim/gradient if text sits on top. Disable under reduced motion. Replace the gradient placeholder with a real <img object-fit:cover>."
  }
  </script>
  <style>
    :root { --dur: 20s; }
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; background: #000; font-family: system-ui, sans-serif; }
    .kb { position: relative; width: 320px; height: 220px; overflow: hidden; border-radius: 14px; }
    .kb__img {
      position: absolute; inset: -10%; background-size: cover; background-position: center;
      background-image: linear-gradient(135deg,#7c5cff,#2dd4bf 50%,#f0abfc);
      animation: kenburns var(--dur) ease-in-out infinite alternate;
    }
    .kb__cap { position: absolute; left: 0; right: 0; bottom: 0; padding: 1rem; color: #fff;
      background: linear-gradient(transparent, rgba(0,0,0,.7)); font-weight: 700; }
    @keyframes kenburns {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.18) translate(-3%, -2%); }
    }
    @media (prefers-reduced-motion: reduce) { .kb__img { animation: none; inset: 0; } }
  </style>
</head>
<body>
  <figure class="kb" style="margin:0">
    <div class="kb__img"></div>
    <figcaption class="kb__cap">Cinematic hero</figcaption>
  </figure>
</body>
</html>
