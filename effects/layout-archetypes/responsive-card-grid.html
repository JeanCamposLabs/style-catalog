<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Responsive Card Grid (no media queries)</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "responsive-card-grid",
    "title": "Responsive Card Grid (no media queries)",
    "summary": "A card grid that reflows columns automatically using auto-fit + minmax — zero breakpoints.",
    "description": "grid-template-columns: repeat(auto-fit, minmax(MIN, 1fr)) makes the grid add/remove columns based on available width, the single most useful responsive grid one-liner.",
    "theme": "layout-archetypes",
    "categories": ["layout", "grid", "responsive", "reference"],
    "tags": ["grid", "auto-fit", "minmax", "responsive", "cards", "intrinsic"],
    "tech": ["css"],
    "era": "2020s",
    "difficulty": "beginner",
    "dependencies": [],
    "browser_support": "All modern browsers.",
    "performance_notes": "Pure layout; free. No JS or media queries.",
    "accessibility_notes": "DOM order = visual order, so tab/reading order is correct by default.",
    "customization": [
      { "name": "min column width", "description": "The minmax minimum that decides when columns wrap", "default": "220px" },
      { "name": "gap", "description": "Spacing between cards", "default": "1rem" }
    ],
    "variations": ["auto-fill (keeps empty tracks) vs auto-fit (collapses them)", "Add minmax(0,1fr) to fix overflow with long content", "Equal-height cards via align-items: stretch"],
    "related": ["bento-grid", "masonry-grid"],
    "ai_usage": "The default responsive grid for card lists, galleries, product grids. One line: grid-template-columns: repeat(auto-fit, minmax(MIN, 1fr)). Choose MIN = the smallest acceptable card width; the grid computes column count per viewport with no media queries. Use auto-fit to collapse empty tracks (cards stretch), auto-fill to keep them. Add minmax(0,1fr) if long words overflow. Resize the frame to watch it reflow."
  }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body { background: #0b0d12; padding: 1rem; font-family: system-ui, sans-serif; overflow: auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .card { background: #151925; border: 1px solid #262c3d; border-radius: 14px; padding: 1.2rem; color: #e7ebf3; }
    .card h3 { margin: 0 0 .3rem; } .card p { margin: 0; color: #8b93a7; font-size: .9rem; }
    .card .thumb { height: 80px; border-radius: 10px; margin-bottom: .8rem; background: linear-gradient(135deg,#7c5cff,#2dd4bf); }
  </style>
</head>
<body>
  <div class="grid">
    <div class="card"><div class="thumb"></div><h3>Card one</h3><p>auto-fit + minmax</p></div>
    <div class="card"><div class="thumb"></div><h3>Card two</h3><p>reflows on resize</p></div>
    <div class="card"><div class="thumb"></div><h3>Card three</h3><p>no media queries</p></div>
    <div class="card"><div class="thumb"></div><h3>Card four</h3><p>equal columns</p></div>
    <div class="card"><div class="thumb"></div><h3>Card five</h3><p>intrinsic responsive</p></div>
    <div class="card"><div class="thumb"></div><h3>Card six</h3><p>one CSS line</p></div>
  </div>
</body>
</html>
