<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scroll Reveal Fade-Up</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "scroll-reveal-fade",
    "title": "Scroll Reveal Fade-Up",
    "summary": "Elements fade and slide up as they enter the viewport, via IntersectionObserver.",
    "description": "Items start hidden (opacity 0, translateY); an IntersectionObserver adds an 'in' class when they scroll into view, triggering a CSS transition. The web-standard, dependency-free replacement for scroll libraries.",
    "theme": "transitions-animations",
    "categories": ["animation", "scroll", "reveal"],
    "tags": ["scroll", "reveal", "fade", "intersection-observer", "entrance", "stagger"],
    "tech": ["css", "js"],
    "era": "2020s",
    "difficulty": "intermediate",
    "dependencies": [],
    "browser_support": "All modern browsers (IntersectionObserver universally supported).",
    "performance_notes": "Far cheaper than scroll-event listeners; the observer fires only at thresholds. Transition animates opacity/transform.",
    "accessibility_notes": "Content is in the DOM and accessible regardless of reveal state. Under prefers-reduced-motion, show everything immediately (no transform).",
    "customization": [
      { "name": "--rise", "description": "Distance items travel up", "default": "24px" },
      { "name": "threshold", "description": "How much must be visible to trigger", "default": "0.15" }
    ],
    "variations": ["Fade from left/right", "Scale-in", "Stagger via transition-delay per index"],
    "related": ["text-reveal-mask"],
    "ai_usage": "The standard scroll-entrance for marketing pages. Give items class .reveal (opacity:0; translateY). Create one IntersectionObserver, observe all .reveal nodes, and add .in on intersection (optionally unobserve to fire once). Stagger with transition-delay tied to index. ALWAYS short-circuit to the visible state under prefers-reduced-motion. The demo auto-scrolls so the effect is visible in the catalog frame."
  }
  </script>
  <style>
    :root { --rise: 24px; }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body { background: #0b0d12; font-family: system-ui, sans-serif; color: #e7ebf3; }
    .scroller { height: 100vh; overflow-y: auto; padding: 1rem; }
    .block { height: 80px; margin: 18px auto; max-width: 300px; border-radius: 12px;
      display: grid; place-items: center; background: #151925; border: 1px solid #262c3d; }
    .reveal { opacity: 0; transform: translateY(var(--rise)); transition: opacity .6s ease, transform .6s ease; }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .spacer { height: 30vh; }
    @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }
  </style>
</head>
<body>
  <div class="scroller" id="scroller">
    <div class="spacer"></div>
    <div class="block reveal">Reveal 1</div>
    <div class="block reveal">Reveal 2</div>
    <div class="block reveal">Reveal 3</div>
    <div class="block reveal">Reveal 4</div>
    <div class="block reveal">Reveal 5</div>
    <div class="spacer"></div>
  </div>
  <script>
    var root = document.getElementById("scroller");
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { root: root, threshold: 0.15 });
    document.querySelectorAll(".reveal").forEach(function (el) { io.observe(el); });
    // Auto-demo: gently scroll so the reveal is visible inside the catalog iframe.
    if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
      var dir = 1;
      setInterval(function () {
        root.scrollTop += dir * 2;
        if (root.scrollTop + root.clientHeight >= root.scrollHeight - 2) dir = -1;
        if (root.scrollTop <= 0) dir = 1;
      }, 16);
    }
  </script>
</body>
</html>
