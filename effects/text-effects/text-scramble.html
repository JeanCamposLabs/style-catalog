<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Text Scramble / Decode</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "text-scramble",
    "title": "Text Scramble / Decode",
    "summary": "Text resolves from random glyph noise into the real words, like a terminal decoding — on load and on hover.",
    "description": "Each character cycles through random symbols before locking to its final letter, staggered left to right, producing a 'decrypting' reveal. A favorite for hero words and hover labels on dev/cyber/creative sites.",
    "theme": "text-effects",
    "categories": ["text", "animation", "javascript"],
    "tags": ["scramble", "decode", "glitch", "terminal", "reveal", "2026-trend"],
    "tech": ["css", "js"],
    "era": "2020s",
    "difficulty": "intermediate",
    "dependencies": [],
    "browser_support": "All modern browsers.",
    "performance_notes": "A single requestAnimationFrame loop mutating textContent for the duration of the reveal, then it stops. Lightweight.",
    "accessibility_notes": "Keep the final text as the element's accessible name (set it before/after, or use aria-label) so screen readers don't read scrambled glyphs. Under reduced-motion, show final text instantly.",
    "customization": [
      { "name": "chars", "description": "Glyph pool for scrambling", "default": "!<>-_\\/[]{}=+*^?#" },
      { "name": "speed", "description": "Frames per character settle", "default": "~ per-char random" }
    ],
    "variations": ["Trigger on scroll into view", "Loop through several phrases", "Color the still-scrambling chars differently"],
    "related": ["typewriter-text", "glitch-text", "kinetic-portfolio"],
    "ai_usage": "Use for hero words, section labels, and hover micro-copy on dev/cyber/creative sites. Implement a setText(newText) that, per character, randomly shows pool glyphs until a per-char 'settle' frame, then locks the real char; drive it with requestAnimationFrame. Set the real string as aria-label (or render it then animate) so assistive tech reads the word, and skip the animation under prefers-reduced-motion."
  }
  </script>
  <style>
    html,body{height:100%;margin:0}
    body{display:grid;place-items:center;background:#06080d;font-family:ui-monospace,Menlo,Consolas,monospace}
    .scramble{font-size:clamp(1.8rem,7vw,4rem);font-weight:700;letter-spacing:.02em;color:#46e0a0;cursor:pointer;
      text-shadow:0 0 18px rgba(70,224,160,.35)}
    .scramble .dud{color:#2a6b52}
    .hint{position:fixed;bottom:1.2rem;color:#3a4a44;font-family:system-ui,sans-serif;font-size:.85rem}
  </style>
</head>
<body>
  <h1 class="scramble" id="t" aria-label="ACCESS GRANTED" title="hover to re-decode">ACCESS GRANTED</h1>
  <p class="hint">hover to re-run</p>
  <script>
    var el=document.getElementById('t');
    var chars='!<>-_\\/[]{}=+*^?#________';
    var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    function scramble(text){
      if(reduce){el.textContent=text;return;}
      var queue=[],frame=0,raf;
      for(var i=0;i<text.length;i++){
        var start=Math.floor(Math.random()*20),end=start+Math.floor(Math.random()*20)+10;
        queue.push({to:text[i],start:start,end:end,ch:''});
      }
      function update(){
        var out='',done=0;
        for(var i=0;i<queue.length;i++){
          var q=queue[i];
          if(frame>=q.end){done++;out+=q.to;}
          else if(frame>=q.start){
            if(!q.ch||Math.random()<0.28)q.ch=chars[Math.floor(Math.random()*chars.length)];
            out+='<span class="dud">'+q.ch+'</span>';
          } else out+='';
        }
        el.innerHTML=out;
        if(done<queue.length){frame++;raf=requestAnimationFrame(update);}
        else el.textContent=text;
      }
      cancelAnimationFrame(raf);update();
    }
    var msg=el.getAttribute('aria-label');
    scramble(msg);
    el.addEventListener('pointerenter',function(){scramble(msg);});
  </script>
</body>
</html>
