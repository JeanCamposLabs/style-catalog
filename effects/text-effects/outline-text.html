<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Outline / Stroke Text</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "outline-text",
    "title": "Outline / Stroke Text",
    "summary": "Hollow outlined lettering that fills with color on hover, via text-stroke.",
    "description": "Uses -webkit-text-stroke with a transparent fill for hollow display text, then transitions to a solid fill on hover — a bold editorial/poster treatment.",
    "theme": "text-effects",
    "categories": ["typography", "outline"],
    "tags": ["outline", "stroke", "hollow", "text-stroke", "poster", "editorial"],
    "tech": ["css"],
    "era": "2020s",
    "difficulty": "beginner",
    "dependencies": [],
    "browser_support": "All modern browsers via -webkit-text-stroke (works cross-browser despite the prefix).",
    "performance_notes": "Static + color transition; trivial.",
    "accessibility_notes": "Hollow text can be low-contrast — keep stroke thick enough and the background plain. Provide a solid-fill fallback for very small sizes where strokes get muddy.",
    "customization": [
      { "name": "--stroke", "description": "Outline color/width", "default": "#7c5cff, 2px" }
    ],
    "variations": ["Outline + drop shadow for depth", "Animated fill sweep on scroll", "Double outline (layered shadows)"],
    "related": ["gradient-text", "long-shadow"],
    "ai_usage": "Use for large display headings, posters, and section numbers. Set -webkit-text-stroke: WIDTH COLOR and color: transparent for a hollow look; transition color to a solid fill on hover/scroll for emphasis. Keep to big, bold weights — thin/small text loses legibility. Ensure contrast and provide a solid fallback at small sizes."
  }
  </script>
  <style>
    :root { --stroke: #7c5cff; }
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; background: #0b0d12; font-family: system-ui, sans-serif; }
    .outline {
      font-size: 5rem; font-weight: 900; letter-spacing: -.02em; color: transparent;
      -webkit-text-stroke: 2px var(--stroke); text-stroke: 2px var(--stroke);
      transition: color .35s ease;
    }
    .outline:hover { color: var(--stroke); }
    @media (prefers-reduced-motion: reduce) { .outline { transition: none; } }
  </style>
</head>
<body>
  <div class="outline">BOLD</div>
</body>
</html>
