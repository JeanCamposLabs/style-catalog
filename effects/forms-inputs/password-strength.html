<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Strength Meter</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "password-strength",
    "title": "Password Strength Meter",
    "summary": "A password field with a live strength bar, a weak→strong label, a show/hide toggle, and a ticking requirements checklist.",
    "description": "As the user types, a segmented bar fills and recolors (red→amber→green), a label updates, and a checklist of requirements (length, case, number, symbol) checks off — the standard, reassuring sign-up affordance.",
    "theme": "forms-inputs",
    "categories": ["form", "input", "validation"],
    "tags": ["password", "strength", "meter", "validation", "checklist", "show-hide"],
    "tech": ["css", "js"],
    "era": "2020s",
    "difficulty": "intermediate",
    "dependencies": [],
    "browser_support": "All modern browsers.",
    "performance_notes": "A few regex tests on input; negligible.",
    "accessibility_notes": "Strength is announced via aria-live (not color-only); the show/hide button has aria-pressed and toggles input type; the checklist items use text + aria-checked. Real labeled input.",
    "customization": [
      { "name": "rules", "description": "Requirement checks + weights", "default": "len/case/num/symbol" },
      { "name": "colors", "description": "weak/medium/strong", "default": "red/amber/green" }
    ],
    "variations": ["zxcvbn-style scoring", "Inline 'breached password' warning", "Minimum-bar gate on submit"],
    "related": ["floating-label-input", "otp-input", "animated-checkbox"],
    "ai_usage": "Use on sign-up and password-change forms. On input, score the value against rules (length, lower/upper, number, symbol), set the bar width/color and a text label, and tick the checklist. Announce the label via aria-live='polite' so it isn't color-only, give the show/hide toggle aria-pressed, and keep the input properly labeled. Don't block paste from password managers."
  }
  </script>
  <style>
    :root{--weak:#ef4444;--mid:#f59e0b;--strong:#22c55e;--bg:#11131b;--line:#2a3040;--text:#e8ecf6;--muted:#8b93a7;}
    html,body{height:100%;margin:0}
    body{display:grid;place-items:center;background:#0b0d12;color:var(--text);font-family:system-ui,sans-serif}
    .field{width:min(360px,90vw)}
    label{display:block;font-weight:600;margin-bottom:.5rem}
    .input{display:flex;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:.2rem .4rem .2rem .9rem}
    .input input{flex:1;border:none;outline:none;background:transparent;color:var(--text);font-size:1rem;padding:.7rem 0}
    .input button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:.4rem .6rem}
    .input:focus-within{border-color:#7c5cff;box-shadow:0 0 0 4px rgba(124,92,255,.2)}
    .bars{display:flex;gap:6px;margin:.7rem 0 .4rem}
    .bars i{height:6px;flex:1;border-radius:4px;background:var(--line);transition:background .25s}
    .label{font-size:.85rem;font-weight:700;min-height:1.2em}
    ul{list-style:none;padding:0;margin:.8rem 0 0;color:var(--muted);font-size:.85rem}
    li{padding:.18rem 0;transition:color .2s}li::before{content:"○ ";}
    li.ok{color:var(--strong)}li.ok::before{content:"✓ "}
  </style>
</head>
<body>
  <div class="field">
    <label for="pw">Create a password</label>
    <div class="input">
      <input id="pw" type="password" autocomplete="new-password" placeholder="••••••••" />
      <button id="toggle" type="button" aria-pressed="false" aria-label="Show password">Show</button>
    </div>
    <div class="bars" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
    <div class="label" id="label" role="status" aria-live="polite"></div>
    <ul id="rules">
      <li data-k="len">At least 8 characters</li>
      <li data-k="case">Upper &amp; lowercase letters</li>
      <li data-k="num">A number</li>
      <li data-k="sym">A symbol</li>
    </ul>
  </div>
  <script>
    var pw=document.getElementById('pw'),bars=document.querySelectorAll('.bars i'),label=document.getElementById('label'),toggle=document.getElementById('toggle');
    var rules=[].slice.call(document.querySelectorAll('#rules li'));
    var COLORS=['','var(--weak)','var(--mid)','var(--mid)','var(--strong)'];
    var WORDS=['','Weak','Fair','Good','Strong'];
    function score(v){
      var checks={len:v.length>=8,case:/[a-z]/.test(v)&&/[A-Z]/.test(v),num:/\d/.test(v),sym:/[^A-Za-z0-9]/.test(v)};
      rules.forEach(function(li){li.classList.toggle('ok',checks[li.dataset.k]);});
      return Object.keys(checks).reduce(function(n,k){return n+(checks[k]?1:0)},0);
    }
    pw.addEventListener('input',function(){
      var s=pw.value?score(pw.value):0;
      bars.forEach(function(b,i){b.style.background=i<s?COLORS[s]:'var(--line)';});
      label.textContent=pw.value?WORDS[s]+' password':'';
      label.style.color=COLORS[s]||'var(--muted)';
    });
    toggle.addEventListener('click',function(){
      var show=pw.type==='password';pw.type=show?'text':'password';
      toggle.textContent=show?'Hide':'Show';toggle.setAttribute('aria-pressed',show);toggle.setAttribute('aria-label',show?'Hide password':'Show password');
    });
  </script>
</body>
</html>
