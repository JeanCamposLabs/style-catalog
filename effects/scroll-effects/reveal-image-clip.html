<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Clip Reveal on Scroll</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "reveal-image-clip",
    "title": "Image Clip Reveal on Scroll",
    "summary": "An image unveils behind a clip-path wipe as it scrolls into view.",
    "description": "Combines IntersectionObserver with a clip-path inset transition so the image is wiped into view (rather than just faded) when it enters the viewport — a premium editorial reveal.",
    "theme": "scroll-effects",
    "categories": ["scroll", "reveal", "image"],
    "tags": ["reveal", "clip-path", "scroll", "wipe", "intersection-observer", "image"],
    "tech": ["css", "js"],
    "era": "2020s",
    "difficulty": "intermediate",
    "dependencies": [],
    "browser_support": "All modern browsers.",
    "performance_notes": "Animating clip-path is GPU-friendly; the observer fires once per element.",
    "accessibility_notes": "Image is in the DOM regardless; under prefers-reduced-motion show it immediately (no clip). Provide real alt text.",
    "customization": [
      { "name": "--ease / duration", "description": "Wipe timing", "default": "0.9s cubic-bezier(.22,1,.36,1)" },
      { "name": "direction", "description": "inset side that opens", "default": "left-to-right" }
    ],
    "variations": ["Reveal direction per item (alternating)", "Combine with a slight scale for depth", "Circle/iris reveal via circle() clip-path"],
    "related": ["scroll-reveal-fade", "clip-path-shapes", "text-reveal-mask"],
    "ai_usage": "Use for figure/image reveals in articles and case studies. Start the image clipped (clip-path: inset(0 100% 0 0)) and transition to inset(0) when an IntersectionObserver adds the .in class. Change which inset side is 100% to set wipe direction. Short-circuit to fully revealed under prefers-reduced-motion. The demo auto-scrolls so the wipe is visible in the catalog frame."
  }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body { background: #0b0d12; font-family: system-ui, sans-serif; }
    .scroller { height: 100vh; overflow-y: auto; padding: 1rem; }
    .spacer { height: 60vh; }
    .figure { width: 280px; height: 180px; margin: 1rem auto; border-radius: 14px; overflow: hidden; }
    .figure .img {
      width: 100%; height: 100%; background: linear-gradient(135deg,#7c5cff,#2dd4bf);
      clip-path: inset(0 100% 0 0); transition: clip-path .9s cubic-bezier(.22,1,.36,1);
    }
    .figure.in .img { clip-path: inset(0 0 0 0); }
    @media (prefers-reduced-motion: reduce) { .figure .img { transition: none; clip-path: inset(0); } }
  </style>
</head>
<body>
  <div class="scroller" id="scroller">
    <div class="spacer"></div>
    <div class="figure"><div class="img"></div></div>
    <div class="figure"><div class="img"></div></div>
    <div class="figure"><div class="img"></div></div>
    <div class="spacer"></div>
  </div>
  <script>
    var root = document.getElementById("scroller");
    var io = new IntersectionObserver(function (es) {
      es.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { root: root, threshold: 0.4 });
    document.querySelectorAll(".figure").forEach(function (f) { io.observe(f); });
    if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
      var dir = 1;
      setInterval(function () {
        root.scrollTop += dir * 2;
        if (root.scrollTop + root.clientHeight >= root.scrollHeight - 2) dir = -1;
        if (root.scrollTop <= 0) dir = 1;
      }, 16);
    }
  </script>
</body>
</html>
