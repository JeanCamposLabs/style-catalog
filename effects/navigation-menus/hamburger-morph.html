<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hamburger → X Morph</title>
  <script type="application/json" id="effect-meta">
  {
    "id": "hamburger-morph",
    "title": "Hamburger → X Morph",
    "summary": "A three-line menu icon that smoothly morphs into a close (X) when toggled.",
    "description": "Three bars transform on toggle: the middle fades, the top and bottom rotate ±45° and translate to form an X — the canonical menu-button animation, on a real accessible button.",
    "theme": "navigation-menus",
    "categories": ["navigation", "menu", "icon"],
    "tags": ["hamburger", "menu", "toggle", "morph", "x", "icon"],
    "tech": ["css", "js"],
    "era": "2010s",
    "difficulty": "beginner",
    "dependencies": [],
    "browser_support": "All browsers.",
    "performance_notes": "Transform/opacity transitions on three spans; trivial.",
    "accessibility_notes": "Built on a <button> with aria-expanded and aria-label that updates on toggle — essential for screen readers. Transition removed under prefers-reduced-motion.",
    "customization": [
      { "name": "--bar", "description": "Bar color", "default": "#e7ebf3" },
      { "name": "--w", "description": "Icon width", "default": "32px" }
    ],
    "variations": ["Morph to back-arrow instead of X", "Spin the whole icon while morphing", "Plus → minus for accordions"],
    "related": ["underline-grow-link"],
    "ai_usage": "Mobile nav toggle. MUST be a real <button> with aria-label and aria-expanded toggled in JS (also drive opening the actual menu from the same state). Three .bar spans; on the .open state, translate+rotate the top/bottom into an X and fade the middle. The top/bottom translate distance equals the gap between bars. Remove transition under reduced motion."
  }
  </script>
  <style>
    :root { --bar: #e7ebf3; --w: 32px; }
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; background: #0b0d12; }
    .burger {
      background: none; border: none; cursor: pointer; padding: 10px;
      display: inline-flex; flex-direction: column; gap: 7px;
    }
    .bar { width: var(--w); height: 3px; border-radius: 3px; background: var(--bar); transition: transform .3s ease, opacity .3s ease; }
    .burger.open .bar:nth-child(1) { transform: translateY(10px) rotate(45deg); }
    .burger.open .bar:nth-child(2) { opacity: 0; }
    .burger.open .bar:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }
    @media (prefers-reduced-motion: reduce) { .bar { transition: none; } }
  </style>
</head>
<body>
  <button class="burger" id="burger" aria-label="Open menu" aria-expanded="false">
    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
  </button>
  <script>
    var b = document.getElementById("burger");
    b.addEventListener("click", function () {
      var open = b.classList.toggle("open");
      b.setAttribute("aria-expanded", String(open));
      b.setAttribute("aria-label", open ? "Close menu" : "Open menu");
    });
  </script>
</body>
</html>
