<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Style Catalog — A Museum of Web Effects</title>
  <meta name="description" content="A museum and catalogue of web design effects across the history of the internet. Built by an AI agent, for AI agents." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>" />
  <link rel="stylesheet" href="assets/app.css" />
</head>
<body>
  <header class="masthead">
    <div class="masthead__brand">
      <span class="masthead__logo">🖼️</span>
      <div>
        <h1>Style Catalog</h1>
        <p class="masthead__tagline">A museum &amp; catalogue of web effects — built by an AI agent, for AI agents.</p>
      </div>
    </div>
    <div class="masthead__stats" id="stats" aria-live="polite"></div>
  </header>

  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5Zm-6 0A4.5 4.5 0 1 1 14 9.5 4.49 4.49 0 0 1 9.5 14Z"/></svg>
      <input id="search" type="search" placeholder="Search effects, tags, descriptions…" autocomplete="off" />
      <button id="clear-search" class="search__clear" title="Clear" hidden>✕</button>
    </div>
    <div class="toolbar__right">
      <label class="sort">
        Sort
        <select id="sort">
          <option value="theme">By theme</option>
          <option value="title">A → Z</option>
          <option value="difficulty">Difficulty</option>
          <option value="era">Era</option>
        </select>
      </label>
      <button id="reset" class="btn btn--ghost">Reset filters</button>
    </div>
  </div>

  <div class="layout">
    <aside class="filters" id="filters" aria-label="Filters"></aside>
    <main class="results">
      <div class="results__head">
        <span id="result-count" class="results__count"></span>
        <span id="active-filters" class="results__active"></span>
      </div>
      <div id="grid" class="grid" aria-live="polite"></div>
      <div id="empty" class="empty" hidden>
        <p>No effects match your filters.</p>
        <button class="btn" id="empty-reset">Clear everything</button>
      </div>
    </main>
  </div>

  <div id="modal" class="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <header class="modal__head">
        <div>
          <span class="badge" id="modal-theme"></span>
          <h2 id="modal-title"></h2>
          <p id="modal-summary" class="modal__summary"></p>
        </div>
        <button class="modal__close" data-close title="Close">✕</button>
      </header>
      <nav class="tabs" id="tabs">
        <button class="tab is-active" data-tab="preview">Preview</button>
        <button class="tab" data-tab="source">Source</button>
        <button class="tab" data-tab="ai">AI Notes</button>
        <button class="tab" data-tab="details">Details</button>
      </nav>
      <div class="modal__body">
        <section class="tabpane is-active" data-pane="preview">
          <div class="preview-frame">
            <iframe id="modal-iframe" title="Live preview" sandbox="allow-scripts allow-same-origin" loading="lazy"></iframe>
          </div>
          <div class="preview-actions">
            <a id="open-new" class="btn btn--ghost" target="_blank" rel="noopener">Open standalone ↗</a>
          </div>
        </section>
        <section class="tabpane" data-pane="source">
          <div class="source-actions">
            <button id="copy-source" class="btn">Copy source</button>
            <span id="copy-status" class="copy-status"></span>
          </div>
          <pre class="source"><code id="modal-source"></code></pre>
        </section>
        <section class="tabpane" data-pane="ai">
          <div id="modal-ai" class="ai-notes"></div>
        </section>
        <section class="tabpane" data-pane="details">
          <div id="modal-details" class="details"></div>
        </section>
      </div>
    </div>
  </div>

  <footer class="colophon">
    <p>Style Catalog · MIT · The catalogue lives in <code>catalog.json</code>. Add effects under <code>effects/&lt;theme&gt;/</code> and run <code>npm run build</code>.</p>
  </footer>

  <a id="version-badge" class="version-badge" target="_blank" rel="noopener" title="Deploy build">v0.5.0</a>

  <script src="assets/catalog.js"></script>
  <!-- Optional deploy stamp (generated at build time; absent in raw checkouts). -->
  <script src="assets/build.js"></script>
  <script>
    (function () {
      var b = window.__BUILD__ || {};
      var cat = window.__CATALOG__ || {};
      var el = document.getElementById("version-badge");
      if (!el) return;
      var version = b.version || cat.version || "dev";
      el.textContent = "v" + version;
      if (b.build != null) {
        el.title =
          "build " + b.build +
          (b.sha ? " · " + b.sha : "") +
          (b.builtAt ? " · " + b.builtAt : "");
      }
      if (b.repo && b.sha && b.sha !== "dev") {
        el.href = "https://github.com/" + b.repo + "/commit/" + b.sha;
      } else {
        el.removeAttribute("href");
      }
    })();
  </script>
  <script src="assets/app.js"></script>
</body>
</html>
